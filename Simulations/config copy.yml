# 缓存资源分配模拟配置文件
# 支持从配置文件中调整参数，无需修改代码

# 基本模拟参数
simulation:
  time: 500  # 模拟时间（秒）
  cache_capacity: 1000  # 网络总缓存容量，视频数
  nb_videos: 10000  # 每个CP的视频数量
  request_rate: 100  # 每秒请求数
  interval_size: 1  # 间隔大小（秒）
  delta: 10  # 分配修改的步长
  method: "Q_learning"  # 优化方法：SARSA, Q_learning, R_learning
  D: [1, 2, 3, 4, 5]  # delta的系数集合

# 服务提供商参数
providers:
  count: 5  # 服务提供商数量
  probabilities: [0.5, 0.2, 0.15, 0.1, 0.05]  # 每个SP的请求概率
  cacheability: [0.7, 0.6, 0.5, 0.4, 0.4]  # 每个SP的可缓存比例
  zipf_alphas: [1.2, 0.4, 0.2, 0.3, 0.5]  # 每个SP的Zipf分布参数

# 强化学习参数
rl:
  gamma: 0.99  # 折扣因子
  alpha: 0.3  # 学习率（降低以提高稳定性）
  epsilon: 0.3  # 探索率（提高以增加搜索空间）
  epsilon_decay: true  # 是否使用epsilon衰减
  alpha_scheduling: true  # 是否使用学习率调度
  activate_memory: true  # 是否使用经验回放
  fixed_seed: false  # 是否固定随机种子，默认为true

# 拓扑配置
topology:
  type: "GEANT"  # 拓扑类型：TREE, PATH, RING, MESH, GEANT, TISCALI, WIDE, GARR
  parameters:

    delay: 1  # 链路时延（毫秒）
  cache_nodes: 1  # 缓存节点数目

# 输出配置
output:
  save_allocations: true  # 是否保存分配历史
  save_results: true  # 是否保存结果
  results_dir: "results"  # 结果保存目录
  figures_dir: "figures"  # 图表保存目录
  network_enabled: true  # 是否启用网络模拟，用于计算和绘制时延
